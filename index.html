<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>수석의방 — 스스로 공부하는 힘</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Serif+KR:wght@400;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet">
  <style>
    @font-face {
        font-family: 'KccBangjeonghwan';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-2@1.0/KCCBangJeonghwan.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }
  </style>
  <link href="https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/GowunBatang-Regular.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/landing.css">
  <link rel="stylesheet" href="styles/bulletin.css">
  <link rel="stylesheet" href="styles/books.css">
  <link rel="stylesheet" href="styles/chat.css">
  <link rel="stylesheet" href="styles/timer.css">
  <link rel="stylesheet" href="styles/dock.css">
</head>

<body>

  <!-- ═══ 랜딩 페이지 (책 표지) ═══ -->
  <section class="landing-page" id="landingPage">
    <div class="cover-scene">
      <div class="cover-shell">
        <div class="cover-spine-el"></div>
        <div class="cover-face">
          <div class="cover-orn"></div>
          <h1 class="cover-title">수석의방</h1>
          <p class="cover-desc" style="display: none;">스스로 공부하는 힘</p>
          
          <div class="cover-search">
            <textarea id="landingInput" class="cover-input" placeholder="궁금한 걸 물어보자" autocomplete="off" autocapitalize="none"></textarea>
            <button type="button" class="cover-sbtn" id="landingSendBtn" title="질문 전송">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
          </div>
          
          <div class="vocab-section">
            <button class="vocab-toggle" id="landingEnterBtn">바로 입장</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ 블레틴 보드 (캐러셀) ═══ -->
  <section class="bulletin-board" id="bulletin">
    <div class="bb-carousel" id="bbCarousel">
      <div class="bb-slides" id="bbSlides">
        <div class="bb-slide">
          <div class="bb-slide-header">
            <div class="bb-slide-title">Planner</div>
          </div>
          <div class="planner-week">
            <div class="planner-week-header" id="pwH"></div>
            <div class="planner-body" id="pwB"></div>
          </div>
        </div>
        <div class="bb-slide">
          <div class="bb-slide-header">
            <div class="bb-slide-title">On going</div>
          </div>
          <div class="ongoing-wrapper">
            <div class="book-spread">
              <div class="bs-page bs-page-left">
                <div class="bs-left-content">
                  <div class="bs-gold-line"></div>
                  <div class="bs-category">수석의 공부법 기본편</div>
                  <div class="bs-title">공부하는 이유</div>
                  <div class="bs-copyright">ⓒ 수석의방</div>
                </div>
              </div>
              <div class="bs-page bs-page-right">
                <div class="bs-right-top">수석의 공부법 기본편</div>
                <div class="bs-right-content">
                  <div class="bs-h1">공부를 왜 하나요?</div>
                  <p class="bs-paragraph">오늘은 간단한 질문으로 시작해볼게요.</p>
                  <p class="bs-paragraph">여러분, 공부를 왜 하나요?</p>
                  <p class="bs-paragraph">이 글을 읽기 전에 먼저 내가 생각하는 공부의 이유를 <span class="bs-highlight">3가지만</span> 아래 빈 칸에
                    적어봅시다.</p>
                  <div class="bs-form-box">
                    <div class="bs-form-title"><span class="icon">✎</span>내가 공부하는 이유 3가지</div>
                    <div class="bs-form-line">1.</div>
                    <div class="bs-form-line">2.</div>
                    <div class="bs-form-line">3.</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="bb-slide">
          <div class="bb-slide-header">
            <div class="bb-slide-title">Homework</div>
          </div>
          <div class="homework-scroll" id="hwScroll"></div>
        </div>
      </div>
      <button class="bb-nav-btn bb-nav-prev" id="bbPrev"><svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6" />
        </svg></button>
      <button class="bb-nav-btn bb-nav-next" id="bbNext"><svg viewBox="0 0 24 24">
          <polyline points="9 6 15 12 9 18" />
        </svg></button>
    </div>
    <div class="bb-dots">
      <button class="bb-dot active" data-slide="0"></button>
      <button class="bb-dot" data-slide="1"></button>
      <button class="bb-dot" data-slide="2"></button>
    </div>
  </section>

  <!-- ═══ 메인 레이아웃 ═══ -->
  <div class="main-layout">
    <!-- 채팅 패널 (노트 필담) -->
    <aside class="chat-panel" id="chatPanel" data-mode="close">
      <div class="chat-top-header" id="chatTopHeader">
        <div class="chat-header-profile">
          <img class="chat-header-avatar" src="https://res.cloudinary.com/dms5vyofw/image/upload/v1774849003/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_%E1%84%87%E1%85%A2%E1%84%80%E1%85%A7%E1%86%BC_pyd6yt.png" alt="김수석 선생님">
          <span class="chat-header-title"></span>
        </div>
        <div class="chat-header-controls">
          <button class="chat-header-btn resize-clone" data-action="refresh" title="대화 새로고침">
            <svg viewBox="0 0 24 24"><path d="M4 4v5h.582M20 20v-5h-.581M4.931 9c.805-2.022 2.766-3.5 5.12-3.5 2.946 0 5.378 2.227 5.765 5.118H18.8C18.4 5.92 14.524 3 10.05 3c-2.762 0-5.207 1.34-6.732 3.4L3 4v5h5L4.931 9zM19.069 15c-.805 2.022-2.766 3.5-5.12 3.5-2.946 0-5.378-2.227-5.765-5.118H5.2c.4 4.698 4.276 7.618 8.75 7.618 2.762 0 5.207-1.34 6.732-3.4L21 20v-5h-5l3.069 4z" fill="currentColor"/></svg>
          </button>
          <button class="chat-header-btn resize-clone" data-mode="full" title="전체 화면">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5" fill="none" /></svg>
          </button>
          <button class="chat-header-btn resize-clone" data-mode="partial" title="부분 열기">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="6" height="18" rx="2" stroke="currentColor" stroke-width="1.5" fill="none" /></svg>
          </button>
          <button class="chat-header-btn resize-clone" data-mode="close" title="닫기">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" /><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" /></svg>
          </button>
        </div>
      </div>
      <div class="note-desk-light" id="deskLight"></div>
      <!-- 딕셔너리 북 구조 적용 (채팅창) -->
      <div class="bk-scene">
        <div class="bk-shell">
          <!-- 1. 책등 -->
          <div class="bk-spine"></div>
          
          <!-- 2. 펼쳐진 페이지 영역 -->
          <div class="bk-pages">
            <!-- 중앙 입체 효과용 레이어들 -->
            <div class="bk-gutter"></div>
            <div class="bk-edge"></div>

            <!-- [좌측 페이지] (가로줄 및 아바타/설명 보존) -->
            <div id="left-page" class="note-page-left">
              <div class="note-left-lines"></div>
              <div class="note-left-initial" id="noteLeftInitial">
                <img class="note-left-avatar" src="https://res.cloudinary.com/dms5vyofw/image/upload/v1774849003/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_%E1%84%87%E1%85%A2%E1%84%80%E1%85%A7%E1%86%BC_pyd6yt.png" alt="김수석">
                <div class="note-left-name">김수석 선생님</div>
                <div class="note-left-sub">수석의방</div>
              </div>
              <div class="note-left-content" id="noteLeftContent"></div>
            </div>

            <!-- [우측 페이지] (채팅 영역 보존) -->
            <div id="right-page" class="note-page-right">
              <div class="note-right-lines"></div>
              <div class="note-chat-area" id="noteChatArea">
              </div>
              
              <div class="note-input-row">
                <input class="note-input" id="aiInput" type="text" placeholder="메시지 입력" autocomplete="off">
                <button class="note-send-btn" id="aiSendBtn">
                  <svg viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                  </svg>
                </button>
              </div>
            </div>
            
          </div>
        </div>
      </div>
      
      <!-- 기존 떠다니던 크기 조절 버튼(note-resize-controls) 삭제됨 -->
    </aside>
    <div class="chat-bookmark" id="chatBookmark">
      <svg viewBox="0 0 24 24">
        <polyline points="9 6 15 12 9 18" />
      </svg>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>

  <!-- ═══ 하단 독 네비게이션 ═══ -->
  <nav class="dock-nav">
    <a class="dock-item active" href="#bulletin" id="dockHome">
      <div class="dock-icon"><svg viewBox="0 0 24 24">
          <path
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z" />
        </svg></div>
      <span class="dock-label">수석의방</span>
    </a>
    <a class="dock-item" href="#sec-today" id="dockToday">
      <div class="dock-icon"><svg viewBox="0 0 24 24">
          <path d="M16 4l4 4-13 13H3v-4L16 4z" />
        </svg></div>
      <span class="dock-label">내공부</span>
    </a>
    <a class="dock-item" href="#sec-study" id="dockStudy">
      <div class="dock-icon"><svg viewBox="0 0 24 24">
          <path
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg></div>
      <span class="dock-label">공부법</span>
    </a>
    <button class="dock-item" id="dockChat">
      <div class="dock-icon"><svg viewBox="0 0 24 24">
          <path
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-4 4-1-4z" />
        </svg></div>
      <span class="dock-label">김수석</span>
    </button>
  </nav>

  <script src="data/programs.js"></script>
  <script src="data/schedule.js"></script>
  <script src="scripts/carousel.js"></script>
  <script src="scripts/planner.js"></script>
  <script src="scripts/sections.js"></script>
  <script src="scripts/chat.js"></script>
  <script src="scripts/timer.js"></script>
  <script src="scripts/dock.js"></script>
  <script src="scripts/landing.js"></script>
  <script src="scripts/app.js"></script>
</body>

</html>
